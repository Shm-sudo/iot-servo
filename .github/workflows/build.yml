name: Build APK with Docker
on: [push, workflow_dispatch]

jobs:
  build-with-docker:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build APK using official Buildozer Docker image
      run: |
        printf 'y\n' | docker run --rm -i \
          -e BUILDOZER_ALLOW_ROOT=1 \
          -v ${{ github.workspace }}:/app \
          -w /app \
          kivy/buildozer buildozer android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: bin/*.apk
